<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="$JOB preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F7FBFF"/>
      <stop offset="0.48" stop-color="#F9FBFD"/>
      <stop offset="1" stop-color="#EEF5FB"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1">
      <stop offset="0" stop-color="#173A66"/>
      <stop offset="1" stop-color="#102C47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#173A66" flood-opacity="0.13"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.55">
    <ellipse cx="180" cy="120" rx="230" ry="82" fill="#79B9FF" opacity="0.2" filter="url(#soft)" transform="rotate(-14 180 120)"/>
    <ellipse cx="1030" cy="190" rx="280" ry="88" fill="#5EA0F2" opacity="0.16" filter="url(#soft)" transform="rotate(12 1030 190)"/>
    <ellipse cx="1000" cy="570" rx="250" ry="72" fill="#173A66" opacity="0.09" filter="url(#soft)" transform="rotate(-9 1000 570)"/>
  </g>
  <g opacity="0.17" stroke="#173A66" stroke-width="1">
    <path d="M70 210 C250 160 430 180 610 145 S970 90 1130 125" fill="none"/>
    <path d="M130 505 C340 440 520 475 735 420 S1040 385 1160 435" fill="none"/>
  </g>

  <g transform="translate(94 84)">
    <rect x="0" y="0" width="1012" height="462" rx="54" fill="#FFFFFF" opacity="0.58" filter="url(#shadow)"/>
    <rect x="1" y="1" width="1010" height="460" rx="53" fill="#FFFFFF" opacity="0.38" stroke="#111827" stroke-opacity="0.05"/>

    <g transform="translate(78 66)">
      <rect width="54" height="54" rx="17" fill="#173A66"/>
      <text x="27" y="37" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="32" font-weight="800" fill="#fff">$</text>
    </g>

    <text x="78" y="188" font-family="Avenir Next, Arial, sans-serif" font-size="72" line-height="1" font-weight="800" fill="#111827">
      <tspan x="78" dy="0">Price your job like</tspan>
      <tspan x="78" dy="78">a career asset.</tspan>
    </text>
    <text x="80" y="352" font-family="Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#667085">
      <tspan x="80" dy="0">AI research, role-specific signals, and a</tspan>
      <tspan x="80" dy="42">personal next-move recommendation.</tspan>
    </text>

    <g transform="translate(690 80)">
      <rect width="230" height="112" rx="32" fill="#FFFFFF" opacity="0.76" stroke="#111827" stroke-opacity="0.06"/>
      <text x="32" y="42" font-family="Avenir Next, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="4" fill="#667085">SYNTHETIC TICKER</text>
      <text x="32" y="88" font-family="Avenir Next, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="5" fill="#173A66">N26-PM</text>
      <rect y="150" width="230" height="66" rx="28" fill="url(#navy)"/>
      <text x="115" y="192" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">Price it →</text>
      <g transform="translate(0 250)">
        <rect width="68" height="54" rx="22" fill="#FFFFFF" opacity="0.74"/>
        <rect x="82" width="68" height="54" rx="22" fill="#FFFFFF" opacity="0.74"/>
        <rect x="164" width="68" height="54" rx="22" fill="#FFFFFF" opacity="0.74"/>
      </g>
    </g>
  </g>
</svg>
